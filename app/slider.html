<div style="padding: 210px 0 100px">
    <div class="container">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide">1
                    <img src="https://swiperjs.com/demos/images/abstract-1.jpg" />
                </div>
                <div class="swiper-slide">2
                    <img src="https://swiperjs.com/demos/images/abstract-2.jpg" />
                </div>
                <div class="swiper-slide">3
                    <img src="https://swiperjs.com/demos/images/abstract-3.jpg" />
                </div>
                <div class="swiper-slide">4
                    <img src="https://swiperjs.com/demos/images/abstract-4.jpg" />
                </div>
                <div class="swiper-slide">5
                    <img src="https://swiperjs.com/demos/images/abstract-5.jpg" />
                </div>
                <div class="swiper-slide">6
                    <img src="https://swiperjs.com/demos/images/abstract-6.jpg" />
                </div>
                <div class="swiper-slide">7
                    <img src="https://swiperjs.com/demos/images/abstract-7.jpg" />
                </div>
                <div class="swiper-slide">8
                    <img src="https://swiperjs.com/demos/images/abstract-8.jpg" />
                </div>
                <div class="swiper-slide">9
                    <img src="https://swiperjs.com/demos/images/abstract-9.jpg" />
                </div>
            </div>
            <div class="swiper-pagination"></div>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                var swiper = new Swiper(".mySwiper", {
                    lazyPreloadPrevNext: 1,
                    effect: "coverflow",
                    grabCursor: true,
                    centeredSlides: true,
                    slidesPerView: 4,
                    /*spaceBetween: 20,*/
                    loop: true,
                    coverflowEffect: {
                        rotate: 0,
                        stretch: "-25",
                        depth: 120,
                        modifier: 2,
                        slideShadows: false,
                    },
                    pagination: {
                        el: ".swiper-pagination",
                    },
                });
            });
        </script>
    </div>
</div>

<style>
    .swiper {
        width: 100%;
        padding-top: 50px;
        padding-bottom: 50px;
    }

    .swiper-slide {
        background-position: center;
        background-size: cover;
        width: 320px;
        height: 450px;
    }

    .swiper-slide img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
</style>
