<div class="container fpad80">
    <div class="fade_in_up">
        <h1 class="page-title">Контактная <span class="text-nowrap">информация</span></h1>
    </div>
    <div class="contact-info">
        <div class="contact-info__item contact-info__item--col-phone fade_in_up" data-delay="0.2">
            <div class="contact-info__item__label">Телефон</div>
            <a href="tel:88003007801" class="tel">8 800 300-78-01</a>
        </div>
        <div class="contact-info__item contact-info__item--col-email fade_in_up" data-delay="0.4">
            <div class="contact-info__item__label">E-MAIL</div>
            <a href="mailto:info@neviol.ru" class="mail">info@neviol.ru</a>
        </div>
        <div class="contact-info__item contact-info__item--col-adr fade_in_up" data-delay="0.6">
            <div class="contact-info__item__label">Адрес</div>
            <div class="address">192019, Санкт-Петербург, <span class="text-nowrap">ул. Седова, д. 11А</span></div>
        </div>
    </div>

    <div id="map" class="contact-map"></div>
    <script src="https://api-maps.yandex.ru/v3/?apikey=c92bd240-0fad-45b6-bdfc-2aa404a8f1d7&lang=ru_RU"></script>
    <script>
        async function initMap() {
            await ymaps3.ready;

            const {YMap, YMapDefaultSchemeLayer, YMapDefaultFeaturesLayer, YMapControls, YMapMarker} = ymaps3;
            const {YMapZoomControl} = await ymaps3.import('@yandex/ymaps3-controls@0.0.1');


            // Создаем карту
            const map = new YMap(document.getElementById('map'), {
                location: {center: [37.6176, 55.7558], zoom: 12},
                behaviors: ['drag', 'pinchZoom', 'dblClick'],

            });

            const controlsContainer = new YMapControls({position: 'right'});
            controlsContainer.addChild(new YMapZoomControl({}));
            map.addChild(controlsContainer);

            // Добавляем слои
            map.addChild(new YMapDefaultSchemeLayer());
            map.addChild(new YMapDefaultFeaturesLayer());


            const markerElement = document.createElement('div');
            markerElement.className = 'my-marker';

            const marker = new YMapMarker(
                {
                    coordinates: [37.6176, 55.7558],
                    icon: {

                        size: [48, 64],
                        offset: [24, 64]
                    }
                },

                markerElement
            );

            /* const marker = new Marker({
                 coordinates: [37.6176, 55.7558],
                 icon: {
                     href: '/images/dist/marker.png',
                     size: [48, 64],
                     offset: [24, 64]
                 }
             });*/

            map.addChild(marker);
        }

        initMap();
    </script>
</div>
